<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>profile_page</title>
</head>
<body>
    <h1>Profile_Page</h1>
    <p>USERNAME:{{user.username}}</p>
    <h2>MY_BLOGS</h2>
    {% for blog in blogs %}
       <h2>{{blog.title}}</h2>
       <p>{{blog.content|truncatewords:25}}</p>
       <a href="{% url 'blog_detail' blog.slug %}">READ MORE</a>
    {% endfor %}
       <hr>
    
</body>
</html>
